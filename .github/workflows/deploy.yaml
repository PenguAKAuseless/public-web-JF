name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ] # Trigger on push to main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          cd frontend  # Navigate to your FE directory
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist # The folder your build tool generates (dist, build, etc.)
          branch: gh-pages # The branch the action will create/update
          github_token: ${{ secrets.GITHUB_TOKEN }}